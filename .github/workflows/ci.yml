name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y vim

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run Tests
        run: go test ./...

      - name: Run Linter
        run: task lint

      - name: Build Binary
        run: task build
